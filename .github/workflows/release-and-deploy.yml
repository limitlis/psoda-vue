name: Release & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-website:
    name: Build & Deploy Website
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build website
        run: |
          npx vp run psoda-website#build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/dist

      - name: Verify deployment
        run: |
          echo "Website deployed to https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
